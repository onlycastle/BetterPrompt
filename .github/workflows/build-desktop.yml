# Desktop App Build & Release Workflow
#
# Triggers:
# - Push tag: desktop-v* (e.g., desktop-v0.1.0) - Creates release with DMG
# - Manual workflow dispatch
#
# Required Secrets:
# - CSC_LINK: Base64-encoded .p12 certificate
# - CSC_KEY_PASSWORD: Certificate password
# - APPLE_ID: Apple Developer ID email
# - APPLE_APP_SPECIFIC_PASSWORD: App-specific password
# - APPLE_TEAM_ID: Developer Team ID
# - GH_TOKEN: GitHub token with releases permission

name: Build Desktop App

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/desktop/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install desktop dependencies
        working-directory: packages/desktop
        run: npm ci

      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/desktop-v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Update package.json version
        working-directory: packages/desktop
        run: |
          npm version ${{ steps.version.outputs.version }} --no-git-tag-version

      - name: Build desktop app
        working-directory: packages/desktop
        env:
          # Vite environment variables
          VITE_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          VITE_API_URL: ${{ vars.NEXT_PUBLIC_APP_URL || 'https://nomoreaislop.app' }}
          VITE_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL || 'https://nomoreaislop.app' }}
        run: npm run build

      - name: Package for macOS (unsigned)
        if: github.event_name == 'workflow_dispatch' && !env.CSC_LINK
        working-directory: packages/desktop
        run: npm run package:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package for macOS (signed & notarized)
        if: env.CSC_LINK
        working-directory: packages/desktop
        run: npm run package:mac
        env:
          # Code signing
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Notarization
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # GitHub
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build artifacts
        working-directory: packages/desktop
        run: ls -la release/

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoMoreAISlop-macOS
          path: packages/desktop/release/*.dmg
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            packages/desktop/release/*.dmg
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## NoMoreAISlop Desktop App v${{ steps.version.outputs.version }}

            ### Download
            - **macOS**: Download the DMG file below

            ### Installation
            1. Download the DMG file
            2. Open the DMG and drag NoMoreAISlop to Applications
            3. Launch from Applications folder

            ### What's New
            See the auto-generated release notes below.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Placeholder for Windows build (future)
  # build-windows:
  #   runs-on: windows-latest
  #   steps:
  #     - name: Build for Windows
  #       run: echo "Windows build placeholder"
