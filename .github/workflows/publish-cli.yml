name: Publish CLI to npm

on:
  push:
    tags:
      - 'cli-v*' # Triggers on tags like cli-v0.5.0
  workflow_dispatch: # Manual trigger
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write # Required for creating releases and pushing tags

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cli

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch full history for version sync commit
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get version info
        id: version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          # For tag-based trigger, extract version from tag
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/cli-v}"
            echo "version=$TAG_VERSION" >> $GITHUB_OUTPUT
            echo "is_tag=true" >> $GITHUB_OUTPUT

            # Check if versions match
            if [[ "$CURRENT_VERSION" != "$TAG_VERSION" ]]; then
              echo "mismatch=true" >> $GITHUB_OUTPUT
              echo "⚠️ Version mismatch: package.json=$CURRENT_VERSION, tag=$TAG_VERSION"
            else
              echo "mismatch=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "is_tag=false" >> $GITHUB_OUTPUT
            echo "mismatch=false" >> $GITHUB_OUTPUT
          fi

      # Auto-sync package.json version from tag (prevents version mismatch errors)
      - name: Sync version from tag
        if: github.ref_type == 'tag' && steps.version.outputs.mismatch == 'true'
        run: |
          TAG_VERSION="${{ steps.version.outputs.version }}"
          echo "📝 Updating package.json version to $TAG_VERSION"
          npm version $TAG_VERSION --no-git-tag-version --allow-same-version

      - name: Bump version (manual trigger only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          npm version ${{ inputs.version_type }} --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: CLI v${{ steps.version.outputs.version }}
          body: |
            ## no-ai-slop CLI v${{ steps.version.outputs.version }}

            Install or update:
            ```bash
            npx no-ai-slop@${{ steps.version.outputs.version }}
            ```

            Or install globally:
            ```bash
            npm install -g no-ai-slop@${{ steps.version.outputs.version }}
            ```
          generate_release_notes: true

      # Sync package.json back to main branch if it was auto-updated
      - name: Sync version to main branch
        if: github.ref_type == 'tag' && steps.version.outputs.mismatch == 'true'
        run: |
          cd ../..  # Go to repo root
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git pull origin main

          # Update package.json on main
          cd packages/cli
          npm version ${{ steps.version.outputs.version }} --no-git-tag-version --allow-same-version

          cd ../..
          git add packages/cli/package.json
          git commit -m "chore(cli): sync version to ${{ steps.version.outputs.version }} [skip ci]" || echo "No changes to commit"
          git push origin main

      - name: Commit version bump (manual trigger only)
        if: github.event_name == 'workflow_dispatch'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore(cli): release v${{ env.NEW_VERSION }}'
          file_pattern: 'packages/cli/package.json'
          tagging_message: 'cli-v${{ env.NEW_VERSION }}'

      - name: Summary
        run: |
          echo "## CLI Published to npm 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Package:** no-ai-slop" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.version.outputs.mismatch }}" == "true" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **Auto-synced**: package.json was updated from ${{ steps.version.outputs.current }} to ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Install" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "npx no-ai-slop" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
