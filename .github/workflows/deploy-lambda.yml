name: Deploy Lambda (SST)

on:
  push:
    branches: [main]
    paths:
      - 'lambda/**'
      - 'infra/**'
      - 'sst.config.ts'
      - 'src/lib/**'
  workflow_dispatch: # Manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Clear system Pulumi (use SST bundled version)
        run: |
          # Remove any pre-installed Pulumi that conflicts with SST
          sudo rm -rf /usr/local/bin/pulumi* || true
          sudo rm -rf ~/.pulumi || true

      - name: Deploy with SST
        run: npx sst deploy --stage production
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Output API URL
        run: |
          echo "## Lambda API Deployed 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check SST console for the API URL" >> $GITHUB_STEP_SUMMARY
