name: Deploy Lambda (SST)

on:
  push:
    branches: [main]
    paths:
      - 'lambda/**'
      - 'infra/**'
      - 'sst.config.ts'
      - 'src/lib/**'
  workflow_dispatch: # Manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Clear system Pulumi (use SST bundled version)
        run: |
          # Remove any pre-installed Pulumi that conflicts with SST
          sudo rm -rf /usr/local/bin/pulumi* || true
          sudo rm -rf ~/.pulumi || true

      - name: Unlock SST (clear stale locks)
        run: npx sst unlock --stage production || true

      - name: Deploy with SST
        id: sst-deploy
        run: |
          # Deploy and capture output
          npx sst deploy --stage production 2>&1 | tee sst-output.txt

          # Extract API URL from SST output
          API_URL=$(grep -oP 'apiUrl:\s*\K(https://[^\s]+)' sst-output.txt || true)
          if [ -n "$API_URL" ]; then
            echo "api_url=$API_URL" >> $GITHUB_OUTPUT
            echo "Lambda API URL: $API_URL"
          fi
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_GEMINI_API_KEY: ${{ secrets.GOOGLE_GEMINI_API_KEY }}

      - name: Add public invoke permission
        run: |
          # Get the Lambda function name (SST naming: nomoreaislop-production-AnalysisFunctionFunction-*)
          FUNCTION_NAME=$(aws lambda list-functions \
            --query "Functions[?starts_with(FunctionName, 'nomoreaislop-production-AnalysisFunction')].FunctionName" \
            --output text)

          if [ -n "$FUNCTION_NAME" ]; then
            echo "Found Lambda function: $FUNCTION_NAME"

            # Add lambda:InvokeFunction permission for public access
            # This is required alongside lambda:InvokeFunctionUrl (AWS 2025 policy)
            aws lambda add-permission \
              --function-name "$FUNCTION_NAME" \
              --statement-id "AllowPublicInvoke" \
              --action "lambda:InvokeFunction" \
              --principal "*" \
              2>/dev/null || echo "Permission already exists or was updated"
          else
            echo "Warning: Lambda function not found"
          fi

      - name: Output API URL
        run: |
          echo "## Lambda API Deployed 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.sst-deploy.outputs.api_url }}" ]; then
            echo "**API URL:** ${{ steps.sst-deploy.outputs.api_url }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "CLI calls Lambda directly (no Vercel proxy needed)." >> $GITHUB_STEP_SUMMARY
          else
            echo "Check SST console for the API URL" >> $GITHUB_STEP_SUMMARY
          fi
